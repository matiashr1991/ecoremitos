version: "3.9"

services:
  app:
    image: ${APP_IMAGE}
    environment:
      TZ: ${TZ}
      APP_ENV: ${APP_ENV}
      PORT: ${APP_INTERNAL_PORT}
      APP_BASE_URL: https://${DOMAIN}

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}

    networks:
      - web
      - trazabilidad_internal

    # Ajustá o eliminá este volumen si tu app no guarda uploads/archivos
    volumes:
      - /opt/stacks/trazabilidad/data/uploads:/app/uploads

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 30s

      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 10s

      rollback_config:
        parallelism: 1
        order: stop-first

      labels:
        - traefik.enable=true
        - traefik.docker.network=web

        - traefik.http.routers.trazabilidad.rule=Host(`${DOMAIN}`)
        - traefik.http.routers.trazabilidad.entrypoints=websecure
        - traefik.http.routers.trazabilidad.tls=true
        - traefik.http.routers.trazabilidad.tls.certresolver=${CERTRESOLVER}

        - traefik.http.routers.trazabilidad.service=trazabilidad-svc
        - traefik.http.services.trazabilidad-svc.loadbalancer.server.port=${APP_INTERNAL_PORT}

  db:
    image: postgres:15-alpine
    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata

    networks:
      - trazabilidad_internal

    volumes:
      - /opt/stacks/trazabilidad/data/postgres:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 30s

networks:
  web:
    external: true
    name: web

  trazabilidad_internal:
    driver: overlay
    attachable: true
